<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrendHunter — 인스타 인기 캐러셀 탐색기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
    }
    header {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1e1e1e;
      position: sticky;
      top: 0;
      background: #0f0f0f;
      z-index: 100;
    }
    .logo {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(90deg, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo span { font-weight: 300; }
    .search-wrap {
      padding: 32px 24px 16px;
      max-width: 720px;
      margin: 0 auto;
    }
    .search-wrap h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
    .search-wrap p { color: #888; font-size: 14px; margin-bottom: 20px; }
    .search-box { display: flex; gap: 8px; }
    .search-box input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 15px;
      color: #f0f0f0;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: #a78bfa; }
    .search-box input::placeholder { color: #555; }
    .search-box button {
      background: linear-gradient(135deg, #a78bfa, #f472b6);
      border: none;
      border-radius: 12px;
      padding: 14px 22px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .search-box button:hover { opacity: 0.85; }
    .categories {
      padding: 0 24px 20px;
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .cat-btn {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 13px;
      color: #aaa;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cat-btn:hover, .cat-btn.active {
      background: #a78bfa22;
      border-color: #a78bfa;
      color: #a78bfa;
    }
    .results-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }
    .results-header {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
    }
    .results-header h2 { font-size: 15px; color: #888; font-weight: 400; }
    .results-header h2 strong { color: #f0f0f0; }
    .card-list { display: flex; flex-direction: column; gap: 12px; }
    .card {
      background: #161616;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 18px 20px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .card:hover {
      border-color: #a78bfa55;
      background: #1a1a1a;
      transform: translateY(-1px);
    }
    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .card-cat {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      background: #a78bfa22;
      color: #a78bfa;
    }
    .card h3 { font-size: 16px; font-weight: 600; line-height: 1.5; margin-bottom: 8px; }
    .card p { font-size: 13px; color: #888; line-height: 1.6; }
    .card-footer {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 12px;
      color: #666;
      background: #1e1e1e;
      padding: 4px 10px;
      border-radius: 6px;
    }
    .open-link {
      margin-left: auto;
      font-size: 12px;
      color: #a78bfa;
    }
    .trending { margin-bottom: 32px; }
    .trending h2 { font-size: 13px; color: #666; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .trending-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      color: #ccc;
      cursor: pointer;
      transition: all 0.15s;
    }
    .chip:hover { border-color: #f472b6; color: #f472b6; }
    .empty { text-align: center; padding: 80px 0; color: #555; }
    .empty .big { font-size: 48px; margin-bottom: 16px; }
  </style>
</head>
<body>

<header>
  <div class="logo">Trend<span>Hunter</span></div>
  <div style="font-size:13px;color:#555;">인스타 캐러셀 탐색기</div>
</header>

<div class="search-wrap">
  <h1>인기 캐러셀 찾기 🔍</h1>
  <p>카테고리를 선택하거나 키워드로 검색하세요</p>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="예: 커플 소통, 자기계발, 팀 빌딩..." />
    <button onclick="doSearch()">검색</button>
  </div>
</div>

<div class="categories">
  <button class="cat-btn active" onclick="selectCat(this,'all')">✨ 전체</button>
  <button class="cat-btn" onclick="selectCat(this,'self')">🌱 자기계발</button>
  <button class="cat-btn" onclick="selectCat(this,'couple')">💑 커플소통</button>
  <button class="cat-btn" onclick="selectCat(this,'friend')">🤝 친구관계</button>
  <button class="cat-btn" onclick="selectCat(this,'family')">🏡 가족관계</button>
  <button class="cat-btn" onclick="selectCat(this,'team')">💼 팀 문화</button>
</div>

<div class="results-wrap">
  <div class="trending" id="trendingSection">
    <h2>🔥 인기 검색어</h2>
    <div class="trending-chips">
      <span class="chip" onclick="quickSearch('커플 갈등 해결')">커플 갈등 해결</span>
      <span class="chip" onclick="quickSearch('자존감 높이기')">자존감 높이기</span>
      <span class="chip" onclick="quickSearch('직장 인간관계')">직장 인간관계</span>
      <span class="chip" onclick="quickSearch('아침 루틴')">아침 루틴</span>
      <span class="chip" onclick="quickSearch('감정 표현')">감정 표현</span>
      <span class="chip" onclick="quickSearch('팀 소통')">팀 소통</span>
      <span class="chip" onclick="quickSearch('부모님과 대화')">부모님과 대화</span>
      <span class="chip" onclick="quickSearch('나쁜 습관 고치기')">나쁜 습관 고치기</span>
    </div>
  </div>

  <div id="resultsHeader" class="results-header" style="display:none;">
    <h2 id="resultsCount"></h2>
  </div>
  <div id="resultsList" class="card-list"></div>
  <div id="emptyEl" class="empty" style="display:none;">
    <div class="big">🔍</div>
    <p>검색 결과가 없어요.</p>
  </div>
</div>

<script>
  const CARDS = [
    { cat:'self', catLabel:'자기계발', title:'매일 10분으로 바꾸는 아침 루틴 7가지', desc:'성공한 사람들의 아침을 분석한 캐러셀. 실천 가능한 작은 습관부터 단계별로 정리.', tags:['#아침루틴','#자기계발','#습관'], q:'아침루틴 자기계발 인스타그램 캐러셀' },
    { cat:'self', catLabel:'자기계발', title:'자존감이 낮을 때 나타나는 신호 8가지', desc:'심리학 기반 자존감 체크리스트. 공감 유도형으로 저장률과 공유율이 높은 포맷.', tags:['#자존감','#심리','#멘탈케어'], q:'자존감 심리 인스타그램 캐러셀' },
    { cat:'self', catLabel:'자기계발', title:'나쁜 습관을 끊는 과학적인 방법 5가지', desc:'뇌과학과 행동심리학을 쉽게 풀어낸 캐러셀. 정보 밀도가 높아 저장 유도 최적화.', tags:['#습관','#뇌과학','#자기계발'], q:'습관 뇌과학 인스타그램 캐러셀' },
    { cat:'self', catLabel:'자기계발', title:'번아웃 전에 오는 경고 신호 6가지', desc:'현대인 공감형 정보 콘텐츠. 직장인·프리랜서 타깃으로 저장+공유 모두 높음.', tags:['#번아웃','#멘탈','#자기계발'], q:'번아웃 멘탈 인스타그램 캐러셀' },
    { cat:'couple', catLabel:'커플소통', title:'연인과 싸울 때 절대 하면 안 되는 말 6가지', desc:'커플 갈등 상황의 언어 패턴 분석. 공감+실용 정보로 높은 저장률.', tags:['#커플','#연애','#소통'], q:'커플소통 갈등 인스타그램 캐러셀' },
    { cat:'couple', catLabel:'커플소통', title:'애착 유형별 연애 스타일 완전 정리', desc:'회피형·불안형·안정형 애착 설명 캐러셀. 테스트 유도형으로 댓글 참여율 매우 높음.', tags:['#애착유형','#연애심리','#커플'], q:'애착유형 연애심리 인스타그램 캐러셀' },
    { cat:'couple', catLabel:'커플소통', title:'오래가는 커플이 매일 하는 작은 습관들', desc:'장기 연애 커플의 소통 루틴. 따뜻한 톤으로 공유 유도에 최적화.', tags:['#장기연애','#커플루틴','#소통'], q:'장기연애 커플루틴 인스타그램 캐러셀' },
    { cat:'friend', catLabel:'친구관계', title:'진짜 친구인지 아닌지 알 수 있는 신호', desc:'건강한 우정 vs toxic 관계 구분 기준. 공감 반응이 높아 저장 폭발.', tags:['#친구','#인간관계','#경계선'], q:'친구관계 인간관계 인스타그램 캐러셀' },
    { cat:'friend', catLabel:'친구관계', title:'어른이 되면서 친구가 없어지는 이유', desc:'2030세대 공감 포인트를 건드리는 심리 콘텐츠. 댓글과 DM 유입이 많은 포맷.', tags:['#어른','#2030','#친구'], q:'어른 친구관계 2030 인스타그램 캐러셀' },
    { cat:'family', catLabel:'가족관계', title:'부모님과 대화가 안 될 때 써먹는 말 5가지', desc:'세대 간 소통 방법을 현실적으로 풀어낸 캐러셀. 20-40대 공감형 콘텐츠.', tags:['#가족','#부모님','#소통'], q:'가족소통 부모님 인스타그램 캐러셀' },
    { cat:'family', catLabel:'가족관계', title:'독립한 후 부모님과 사이가 좋아진 이유', desc:'독립 후 가족 관계 변화를 솔직하게 담은 스토리형 캐러셀. 저장+공유율 높음.', tags:['#독립','#가족','#관계변화'], q:'독립 가족관계 인스타그램 캐러셀' },
    { cat:'team', catLabel:'팀 문화', title:'좋은 팀장이 절대 하지 않는 말 7가지', desc:'리더십 커뮤니케이션 캐러셀. 직장인 공감형으로 저장·공유 모두 높은 포맷.', tags:['#팀장','#리더십','#직장'], q:'리더십 팀소통 인스타그램 캐러셀' },
    { cat:'team', catLabel:'팀 문화', title:'심리적 안전감이 높은 팀의 특징 6가지', desc:'구글 아리스토텔레스 연구를 쉽게 풀어낸 팀 문화 캐러셀. HR·스타트업 타깃 인기.', tags:['#심리적안전감','#팀문화','#조직'], q:'심리적안전감 팀문화 인스타그램 캐러셀' },
    { cat:'team', catLabel:'팀 문화', title:'MZ세대가 퇴사를 결심하는 진짜 이유', desc:'세대 이해 기반의 조직 문화 콘텐츠. 리더·HR 담당자에게 높은 공유율.', tags:['#MZ','#퇴사','#팀문화'], q:'MZ세대 퇴사 팀문화 인스타그램 캐러셀' },
  ];

  let currentCat = 'all';

  function selectCat(el, cat) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    currentCat = cat;
    const filtered = cat === 'all' ? CARDS : CARDS.filter(c => c.cat === cat);
    renderCards(filtered);
    document.getElementById('trendingSection').style.display = 'none';
  }

  function quickSearch(q) {
    document.getElementById('searchInput').value = q;
    doSearch();
  }

  function doSearch() {
    const input = document.getElementById('searchInput').value.trim();
    if (!input) return;
    const query = input + ' 인스타그램 캐러셀 인기';
    window.open('https://www.google.com/search?q=' + encodeURIComponent(query), '_blank');
  }

  function renderCards(cards) {
    const list = document.getElementById('resultsList');
    const header = document.getElementById('resultsHeader');
    const count = document.getElementById('resultsCount');
    const empty = document.getElementById('emptyEl');
    document.getElementById('trendingSection').style.display = 'none';

    if (!cards.length) {
      list.innerHTML = '';
      header.style.display = 'none';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    header.style.display = 'flex';
    count.innerHTML = '<strong>' + cards.length + '개</strong> 캐러셀 아이디어';
    list.innerHTML = cards.map(c =>
      '<a class="card" href="https://www.google.com/search?q=' + encodeURIComponent(c.q) + '" target="_blank" rel="noopener">' +
      '<div class="card-top"><span class="card-cat">' + c.catLabel + '</span></div>' +
      '<h3>' + c.title + '</h3>' +
      '<p>' + c.desc + '</p>' +
      '<div class="card-footer">' +
      c.tags.map(t => '<span class="tag">' + t + '</span>').join('') +
      '<span class="open-link">검색 열기 →</span>' +
      '</div></a>'
    ).join('');
  }

  renderCards(CARDS);
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });
</script>
</body>
</html>
